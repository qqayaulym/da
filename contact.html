        </nav>
    </header>
    <main>
        <marquee behavior="" direction="" style="font-size: 45px;">Брондау бөлігі</marquee>
        <section class="booking">
            <h2>Брондау формасы:</h2>
            <form>
                <label for="name">Аты-жөні:</label>
                <input type="text" id="name" name="name" placeholder="Құдайберген Аяулым"
                    pattern="[A-Za-zА-Яа-яӘәІіҢңҒғҮүҰұҚқӨөҺһ ]+" required><br><br>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="ayaulymkudaibergen10@gmail.com"
                    required><br><br>

                <label for="phone">Телефон:</label>
                <input type="tel" id="phone" name="phone" placeholder="+7 777 023 44 52" pattern="[0-9+ ]{10,15}"
                    required>
                <label for="destination">Саяхат бағыты:</label>
                <select name="destination" id="destination">
                    <option value="" disabled selected>Таңдаңыз</option>
                    <option>Париж</option>
                    <option>Токио</option>
                    <option>Астана</option>
                    <option>Ханой</option>
                </select>

                <label for="date">Саяхат күні:</label><br>
                <input type="date" id="date" name="date" required><br><br>

                <button type="submit">Брондау</button>
            </form>
        </section>
    </main>

            </p>
            <p class="year">&copy; 2026</p>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
